databases:
  - name: langfuse-db
    databaseName: langfuse
    user: langfuse

services:
  - type: web
    name: langfuse
    runtime: docker
    plan: starter
    autoDeploy: false
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: langfuse-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: SALT
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://langfuse.example.com
